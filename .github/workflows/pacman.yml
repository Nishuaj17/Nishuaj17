name: Generate Pac-Man

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pac-Man graph
        uses: lowlighter/metrics@latest
        with:
          filename: pacman.svg
          token: ${{ secrets.GITHUB_TOKEN }}

          base: ""

          plugin_isocalendar: no

          plugin_topics: no

          plugin_followup: no

          plugin_habits: no

          plugin_people: no

          plugin_stars: no

          plugin_lines: no

          plugin_traffic: no

          plugin_languages: no

          plugin_notable: no

          plugin_calendar: no

          plugin_introduction: no

          plugin_achievements: no

          plugin_skyline: no

          plugin_discussions: no

          plugin_pagespeed: no

          plugin_code: no

          plugin_wakatime: no

          plugin_projects: no

          plugin_repositories: no

          plugin_activity: no

          plugin_gists: no

          plugin_pacman: yes
